<script src="config.js"></script>

<script>
  (async function () {
    const cfg = window.TAHOE_CONFIG;
    const data = await window.TAHOE_DATA.fetchAll();
    if (data.mock) document.getElementById("mock-tag-foot").hidden = false;

    const KIND = {
      meal:      { emoji: "🍽️",  pill: "warm", label: "meal" },
      hike:      { emoji: "🥾",  pill: "pine", label: "hike" },
      beach:     { emoji: "🏖️", pill: "",     label: "beach" },
      kids:      { emoji: "🧒",  pill: "warm", label: "kids" },
      logistics: { emoji: "📦",  pill: "muted", label: "logistics" },
    };

    const root = document.getElementById("days");
    cfg.days.forEach(d => {
      const items = data.schedule.filter(s => s.date === d.date)
        .sort((a, b) => (a.time || "").localeCompare(b.time || ""));
      const card = document.createElement("div");
      card.className = "card day-card";
      const list = items.map(s => {
        const k = KIND[s.kind] || { emoji: "•", pill: "muted", label: s.kind || "" };
        return `
          <div class="day-item">
            <div class="time">${s.time === "all day" ? "All day" : s.time}</div>
            <div>
              <div class="title">${k.emoji} ${s.title}</div>
              ${s.lead ? `<div class="lead">Led by ${s.lead}</div>` : ""}
            </div>
            ${s.kind ? `<span class="pill ${k.pill}">${k.label}</span>` : ""}
          </div>`;
      }).join("") || `<div class="day-item"><div class="time">—</div><div class="title">Open day. Go to the lake.</div><div></div></div>`;
      card.innerHTML = `
        <div class="day-head">
          <span class="name">${d.label}</span>
          <span class="date">${d.short}</span>
        </div>
        ${list}
      `;
      root.appendChild(card);
    });
  })();
</script>

</body>
