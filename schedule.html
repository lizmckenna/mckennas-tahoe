<script src="config.js"></script>
<script src="data.js"></script>
<script>
  (async function () {
    const cfg = window.TAHOE_CONFIG;
    const data = await window.TAHOE_DATA.fetchAll();
    if (data.mock) document.getElementById("mock-tag-foot").hidden = false;

    const KIND = {
      meal:      { emoji: "🍽️",  pill: "warm", label: "meal" },
      hike:      { emoji: "🥾",  pill: "pine", label: "hike" },
      beach:     { emoji: "🏖️", pill: "",     label: "beach" },
      bike:      { emoji: "🚴",  pill: "pine", label: "bike" },
      boat:      { emoji: "🛶",  pill: "",     label: "on the water" },
      game:      { emoji: "🎲",  pill: "warm", label: "games" },
      kids:      { emoji: "🧒",  pill: "warm", label: "kids" },
      logistics: { emoji: "📦",  pill: "muted", label: "logistics" },
    };

    // When an itinerary row has no Kind column, guess one from the title so
    // entries still get an emoji + pill.
    const inferKind = title => {
      const t = (title || "").toLowerCase();
      if (/hike|trail|walk|falls|summit/.test(t)) return "hike";
      if (/bike|cycl|ride/.test(t)) return "bike";
      if (/kayak|paddle|boat|raft|sail|canoe/.test(t)) return "boat";
      if (/beach|swim|lake day|sand/.test(t)) return "beach";
      if (/game|trivia|puzzle|movie|talent/.test(t)) return "game";
      if (/breakfast|lunch|dinner|bbq|cook|potluck|meal/.test(t)) return "meal";
      if (/kid|craft|playground/.test(t)) return "kids";
      return "";
    };

    const root = document.getElementById("days");
    cfg.days.forEach(d => {
      const items = data.schedule.filter(s => s.date === d.date)
        .sort((a, b) => (a.time || "").localeCompare(b.time || ""));
      const card = document.createElement("div");
      card.className = "card day-card";

      // Dinner menu + lead(s) from the meals & chores tab, plus headcount:
      // everyone whose head-counts row covers this day is eating.
      const dl = (data.dinnerLeads || {})[d.date] || {};
      const present = (data.people || []).filter(p => (p.days || []).includes(d.short));
      const adults = present.filter(p => p.role !== "kid").length;
      const kidsN = present.length - adults;
      const headcount = present.length
        ? `<div class="lead">👥 ${present.length} for dinner (${adults} adults, ${kidsN} kids)</div>` : "";
      const dinner = `
          <div class="day-item">
            <div class="time">Dinner</div>
            <div>
              <div class="title">🍽️ ${dl.menu || "Dinner"}</div>
              ${dl.leads ? `<div class="lead">Led by ${dl.leads}</div>` : ""}
              ${headcount}
            </div>
            <span class="pill warm">meal</span>
          </div>`;

      const list = items.map(s => {
        const kindKey = s.kind || inferKind(s.title);
        const k = KIND[kindKey] || { emoji: "🌲", pill: "muted", label: kindKey || "" };
        return `
          <div class="day-item">
            <div class="time">${s.time === "all day" ? "All day" : s.time}</div>
            <div>
              <div class="title">${k.emoji} ${s.title}</div>
              ${s.lead ? `<div class="lead">Led by ${s.lead}</div>` : ""}
            </div>
            ${kindKey ? `<span class="pill ${k.pill}">${k.label}</span>` : ""}
          </div>`;
      }).join("");
      card.innerHTML = `
        <div class="day-head">
          <span class="name">${d.label}</span>
          <span class="date">${d.short}</span>
          <span class="wx" id="wx-${d.date}" style="margin-left:auto;font-size:0.82rem;font-weight:600;color:var(--ink-faint);white-space:nowrap"></span>
        </div>
        ${list}${dinner}
      `;
      root.appendChild(card);
    });

    // Weather + UV per day (Open-Meteo, no key needed). Forecasts reach ~16
    // days out, so cells fill in as the reunion gets closer.
    try {
      const w = cfg.weather || { lat: 39.07, lon: -120.14 };
      const wxEmoji = c =>
        c === 0 ? "☀️" : c <= 2 ? "🌤️" : c === 3 ? "☁️" : c <= 48 ? "🌫️" :
        c <= 57 ? "🌦️" : c <= 67 ? "🌧️" : c <= 77 ? "🌨️" : c <= 82 ? "🌧️" :
        c <= 86 ? "🌨️" : "⛈️";
      const resp = await fetch(
        `https://api.open-meteo.com/v1/forecast?latitude=${w.lat}&longitude=${w.lon}` +
        `&daily=weather_code,temperature_2m_max,temperature_2m_min,uv_index_max` +
        `&temperature_unit=fahrenheit&timezone=America%2FLos_Angeles&forecast_days=16`);
      const wx = await resp.json();
      (wx.daily && wx.daily.time || []).forEach((date, i) => {
        const el = document.getElementById("wx-" + date);
        if (!el) return;
        const uv = wx.daily.uv_index_max[i];
        el.textContent =
          `${wxEmoji(wx.daily.weather_code[i])} ${Math.round(wx.daily.temperature_2m_max[i])}°/` +
          `${Math.round(wx.daily.temperature_2m_min[i])}° · UV ${uv == null ? "–" : Math.round(uv)}`;
      });
    } catch (e) { /* no forecast yet — leave headers plain */ }
  })();
</script>

</body>
</html>
