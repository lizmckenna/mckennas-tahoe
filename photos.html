  <footer class="foot">
    <div>📸 Take more photos this year, and tag the kids when you upload.</div>
  </footer>

</main>

</nav>

<script src="config.js"></script>
<script>
  (function () {
    const cfg = window.TAHOE_CONFIG;
    const grid = document.getElementById("album-grid");
    const albums = cfg.photoAlbums || [];
    if (albums.length === 0) {
      grid.innerHTML = `<div class="card">No albums yet. Drop a Google Photos / Drive / iCloud link into <code>config.js</code> to add one.</div>`;
      return;
    }
    grid.innerHTML = albums.map(a => `
      <a class="album-card" href="${a.url}" target="_blank" rel="noopener">
        <span class="year">${a.year}</span>
        <div class="title">${a.label}</div>
        <div class="open">Open ${a.kind === "icloud" ? "iCloud" : a.kind === "google" ? "Google" : "album"} →</div>
      </a>
    `).join("");
  })();
</script>

</body>
</html>
