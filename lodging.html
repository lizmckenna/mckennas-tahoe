<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5">
  <meta name="theme-color" content="#0d3b5c">
  <title>Where you sleep · Tahoe 2026</title>

<body>

<section class="page-hero">
  <div class="eyebrow">Bed assignments</div>
  <h1>Where you sleep</h1>
  <p class="tagline">Every bed, every night. Empty boxes mean it's open.</p>
</section>

<main class="shell">

  <section class="section">
    <div id="lodging-root"></div>
  </section>

  <footer class="foot">
    <div id="mock-tag-foot" class="mock-tag" hidden>Preview · sample data</div>
    <div>Edit the "lodging" tab in the Google Sheet to change assignments.</div>
  </footer>

</main>

<nav class="tabbar">
  <a class="tab" href="index.html">
    <svg viewBox="0 0 28 28" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M 5 13 L 14 5 L 23 13 L 23 23 L 5 23 Z"/></svg>
    <span class="tab-label">Home</span>
  </a>
  <a class="tab" href="chores.html">
    <svg viewBox="0 0 28 28" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M 14 4 L 14 11"/><path d="M 9 11 L 19 11"/><path d="M 7 11 L 7 24 L 21 24 L 21 11"/></svg>
    <span class="tab-label">Help</span>
  </a>

    <svg viewBox="0 0 28 28" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="14" cy="14" r="9"/><path d="M 14 8 L 14 14 L 18 16"/></svg>

    <span class="tab-label">Beds</span>
  </a>
  <a class="tab" href="photos.html">
    <svg viewBox="0 0 28 28" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="9" width="20" height="15" rx="2"/><path d="M 10 9 L 12 6 L 16 6 L 18 9"/><circle cx="14" cy="16" r="4"/></svg>
    <span class="tab-label">Photos</span>
  </a>
</nav>

<script src="config.js"></script>
<script src="data.js"></script>
<script>
  (async function () {
    const cfg = window.TAHOE_CONFIG;
    const data = await window.TAHOE_DATA.fetchAll();
    if (data.mock) document.getElementById("mock-tag-foot").hidden = false;

    const root = document.getElementById("lodging-root");
    let lastLoc = "";
    data.lodging.forEach(row => {
      if (row.location !== lastLoc) {
        const band = document.createElement("div");
        band.className = "location-band";
        band.textContent = row.location;
        root.appendChild(band);
        const list = document.createElement("div");
        list.className = "bed-list";
        list.id = "list-" + row.location.replace(/\W+/g, "-");
        root.appendChild(list);
        lastLoc = row.location;
      }
      const listId = "list-" + row.location.replace(/\W+/g, "-");
      const list = document.getElementById(listId);
      const card = document.createElement("div");
      card.className = "bed-card";
      const dayHeader = cfg.days.map(d => `<div class="d">${d.label[0]}</div>`).join("");
      const dayCells = cfg.days.map(d => {
        const v = (row.assignments || {})[d.short] || "";
        return `<div class="v ${v ? "" : "empty"}">${v || "open"}</div>`;
      }).join("");
      card.innerHTML = `
        <div class="bed-head">
          <div class="bed-room">${row.room}</div>
          <div class="bed-type">${row.bed || ""}</div>
        </div>
        <div class="bed-days">${dayHeader}${dayCells}</div>
      `;
      list.appendChild(card);
    });
  })();
</script>

</body>
</html>
